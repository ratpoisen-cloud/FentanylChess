<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fentanyl Chess Online</title>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="main-container">
        <div class="top-bar">
            <div id="user-info" class="hidden">
                <img id="user-photo" src="" alt="avatar">
                <span id="user-name"></span>
                <button id="logout-btn" class="btn btn-sm">Выйти</button>
            </div>
            <button id="login-btn" class="btn btn-success">Войти через Google</button>
        </div>

        <div id="lobby-section" class="card">
            <h1>Мои партии</h1>
            <div id="games-list" class="games-grid">Загрузка...</div>
            <button id="create-game-btn" class="btn btn-success btn-large">Создать новую игру</button>
        </div>

        <div id="game-section" class="hidden">
            <div class="game-layout">
                <div class="board-area">
                    <div class="status-box"><div id="status">Ожидание...</div></div>
                    
                    <div id="myBoard">
                        <div id="confirm-move-box" class="confirm-overlay hidden">
                            <button id="confirm-btn" class="btn-round btn-success">✓</button>
                            <button id="cancel-btn" class="btn-round btn-danger">✕</button>
                        </div>
                    </div>

                    <div class="controls">
                        <span>Вы: <strong id="user-color">...</strong></span>
                        <div class="buttons-group">
                            <button id="undo-btn" class="btn">Отмена</button>
                            <button id="resign-btn" class="btn btn-danger">Сдаться</button>
                            <button id="exit-btn" class="btn">В лобби</button>
                        </div>
                    </div>
                </div>

                <div class="side-panel">
                    <h3>История ходов</h3>
                    <div id="move-list"></div>
                    <div class="share-box">
                        <small>Ссылка для друга:</small>
                        <input type="text" id="room-link" readonly>
                    </div>
                </div>
            </div>

            <div id="game-modal" class="modal hidden">
                <div class="modal-content">
                    <h2 id="modal-title">Мат!</h2>
                    <p id="modal-desc"></p>
                    <div class="modal-buttons">
                        <button id="modal-rematch-btn" class="btn btn-success">Реванш (смена сторон)</button>
                        <button id="modal-exit-btn" class="btn">В лобби</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script type="module" src="js/app.js"></script>
</body>
</html>
