<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fentanyl Chess Online</title>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="main-container">
        <div class="top-bar">
            <div id="user-info" class="hidden">
                <img id="user-photo" src="" alt="avatar">
                <span id="user-name"></span>
                <button id="logout-btn" class="btn btn-sm">Выйти</button>
            </div>
            <div id="auth-buttons" class="auth-group">
                <button id="login-google" class="btn btn-google">Google</button>
                <button id="login-apple" class="btn btn-dark">Apple</button>
                <button id="login-email-trigger" class="btn btn-outline">Email</button>
            </div>
        </div>

        <div id="lobby-section" class="card hidden">
            <h1>Мои партии</h1>
            <div id="games-list" class="games-grid">Загрузка ваших игр...</div>
            <button id="create-game-btn" class="btn btn-success btn-large">Создать новую игру</button>
        </div>

        <div id="game-section" class="hidden">
            <div class="game-layout">
                <div class="board-area">
                    <div class="status-box">
                        <div id="status">Ожидание...</div>
                        <div id="user-color" class="badge"></div>
                    </div>
                    
                    <div id="myBoard" style="width: 100%"></div>
                    <div id="takeback-request-box" class="confirm-overlay hidden">
    <div class="request-text">Соперник просит отменить ход?</div>
    <div class="request-buttons">
        <button id="takeback-accept" class="btn-round btn-success">✓</button>
        <button id="takeback-reject" class="btn-round btn-danger">✕</button>
    </div>
</div>

                    <div id="confirm-move-box" class="confirm-overlay hidden">
                        <button id="confirm-btn" class="btn-round btn-success">✓</button>
                        <button id="undo-btn" class="btn-round btn-danger">✕</button>
                    </div>

                    <div class="controls">
                        <button id="resign-btn" class="btn btn-danger">Сдаться</button>
                        <button id="takeback-btn" class="btn btn-outline">Просить отмену</button>
                        <button id="exit-btn" class="btn">В лобби</button>
                    </div>
                </div>

                <div class="side-panel">
                    <h3>История ходов</h3>
                    <div id="move-list" class="move-list-content"></div>
                    <div class="share-box">
                        <small>Пригласить друга:</small>
                        <input type="text" id="room-link" readonly>
                    </div>
                </div>
            </div>
        </div>

        <div id="email-modal" class="modal hidden">
            <div class="modal-content auth-modal">
                <h3>Вход / Регистрация</h3>
                <input type="email" id="email-input" placeholder="Ваша почта" class="input-field">
                <input type="password" id="password-input" placeholder="Пароль" class="input-field">
                <div class="modal-buttons">
                    <button id="email-auth-btn" class="btn btn-success">Войти</button>
                    <button id="close-email-modal" class="btn">Отмена</button>
                </div>
                <p id="email-error" class="error-text hidden"></p>
            </div>
        </div>

        <div id="game-modal" class="modal hidden">
            <div class="modal-content">
                <h2 id="modal-title">Игра окончена</h2>
                <p id="modal-desc"></p>
                <div class="modal-buttons">
                    <button id="modal-rematch-btn" class="btn btn-success">Реванш</button>
                    <button id="modal-exit-btn" class="btn">В лобби</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script type="module" src="js/app.js"></script>
</body>
</html>
