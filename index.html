<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Черно-белые шахматы | Играйте онлайн</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app">
        <!-- Sidebar с настройками -->
        <aside class="sidebar">
            <div class="logo">
                <div class="logo-icon">♜</div>
                <h1>CHESS</h1>
                <p>online</p>
            </div>

            <div class="token-section">
                <div class="section-title">
                    <span class="icon">🔑</span>
                    <span>Авторизация</span>
                </div>
                <input type="password" id="tokenInput" class="token-input" placeholder="Firebase токен (опционально)">
                <button id="saveTokenBtn" class="btn btn-outline">Сохранить</button>
                <div class="token-status" id="tokenStatus">
                    <span class="status-dot offline"></span>
                    Локальный режим
                </div>
            </div>

            <div class="game-section">
                <div class="section-title">
                    <span class="icon">🎮</span>
                    <span>Игра онлайн</span>
                </div>
                <button id="createGameBtn" class="btn btn-primary">
                    <span class="btn-icon">✨</span>
                    Создать игру
                </button>
                <div class="join-box">
                    <input type="text" id="gameIdInput" class="join-input" placeholder="Код игры">
                    <button id="joinGameBtn" class="btn btn-secondary">Подключиться</button>
                </div>
                <div id="gameIdDisplay" class="game-code" style="display: none;">
                    <span class="code-label">Код игры:</span>
                    <span id="gameIdText" class="code-value"></span>
                    <button id="copyLinkBtn" class="copy-btn">📋</button>
                </div>
                <div id="opponentStatus" class="opponent-status"></div>
            </div>

            <div class="controls-section">
                <div class="section-title">
                    <span class="icon">⚙️</span>
                    <span>Управление</span>
                </div>
                <button id="undoBtn" class="btn btn-outline">
                    <span class="btn-icon">↩️</span>
                    Отменить ход
                </button>
                <button id="resetGameBtn" class="btn btn-outline">
                    <span class="btn-icon">♻️</span>
                    Новая игра
                </button>
            </div>
        </aside>

        <!-- Main game area -->
        <main class="game-area">
            <div class="game-status-bar">
                <div class="turn-indicator" id="turnIndicator">
                    <div class="turn-light" id="turnLight"></div>
                    <span id="turnText">Белые</span>
                </div>
                <div class="game-status" id="gameStatus">
                    <span class="status-icon">♟️</span>
                    <span>Игра активна</span>
                </div>
            </div>

            <div class="board-container">
                <div class="board-wrapper">
                    <canvas id="chessCanvas" width="600" height="600"></canvas>
                    <div class="drag-overlay" id="dragOverlay"></div>
                </div>
                <div class="coordinates">
                    <div class="files">
                        <span>a</span><span>b</span><span>c</span><span>d</span><span>e</span><span>f</span><span>g</span><span>h</span>
                    </div>
                    <div class="ranks">
                        <span>8</span><span>7</span><span>6</span><span>5</span><span>4</span><span>3</span><span>2</span><span>1</span>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="js/chess-logic.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
