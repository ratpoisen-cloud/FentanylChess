<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fentanyl Chess Online</title>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="game-container">
        <div class="status-box">
            <div id="status">Инициализация...</div>
        </div>
<div class="controls">
    <div id="player-color-info">Вы играете за: <span id="user-color">ожидание...</span></div>
    <button id="undo-btn" class="btn">Отменить ход</button>
</div>
        <div id="myBoard"></div>

        <div class="info-panel">
            <p>ID комнаты: <strong id="room-id">...</strong></p>
            <small>Поделись ссылкой для игры:</small>
            <input type="text" id="room-link" readonly>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    
    <script type="module" src="js/app.js"></script>
</body>
</html>
